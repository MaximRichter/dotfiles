[Settings]
language = en
folder = ~/wallpapers
monitors = All
wallpaper = ~/wallpapers/0010_paper-city-minimal-art.png
show_path_in_tooltip = True
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = wal --cols16 lighten -i $wallpaper -n && themecord -p; pkill -SIGUSR2 waybar 2>/dev/null; pkill -SIGUSR1 nvim 2>/dev/null; pkill -HUP qutebrowser 2>/dev/null
number_of_columns = 3
swww_transition_type = grow
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 144
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = ~/.config/waypaper/style.css

