[Settings]
language = en
folder = ~/wallpapers/cyan
monitors = All
wallpaper = ~/wallpapers/cyan/1291412.png
show_path_in_tooltip = True
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = True
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = wal --cols16 lighten -i $wallpaper -n && themecord -p; pkill -SIGUSR2 waybar 2>/dev/null; pkill -SIGUSR1 nvim 2>/dev/null; pkill -HUP qutebrowser 2>/dev/null; bash ~/.local/share/pywal16-libadwaita/scripts/apply-theme.sh; gradience-cli apply -p ~/.var/app/com.github.GradienceTeam.Gradience/config/presets/user/pywal.json --gtk both; bash ~/.local/share/pywal16-libadwaita/scripts/wal-papirus.sh
number_of_columns = 3
swww_transition_type = center
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 1.5
swww_transition_fps = 144
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = ~/.config/waypaper/style.css

